seed: 42
hydra:
  run:
    dir: .

experiment:
  task: classification
  ckpt_file_name: resnet18_binomial_cls_oaps_calibration

data:
  repo: nasa-ibm-ai4science/surya-bench-flare-forecasting
  ref_mask_img: null
  flare_index:
    path: /scratch/users/jhong36/data/
    train: train.csv
    val: validation.csv
    test: test.csv
    cal: validation.csv 
  input_zarr_path: /scratch/users/jhong36/data/sdo_512.zarr
  input_time_delta: [0]
  input_stat_path: ./assets/stats/los_mag_stat.yaml
  label_type: max_goes_class
  limb_mask_path: ./assets/limb_mask.npy
  target_norm_type: multi_class
  channel: hmi_m
  num_workers: 6
  batch_size: 256
  pin_memory: true

check_point:
  model_type: resnet18_binomial
  base: ./assets/checkpoints/cls/
  resnet18_binomial_cls: null # Will be updated with the trained checkpoint

uc:
  csv_path: ./assets/uc_results/
  significance_level: 0.1
  methods: [oaps, min_cps, min_rcps, copoc, risk_control]
  num_classes: 5
  class_wise: true
  class_mapping: {"FQ": 0, "B": 1, "C": 2, "M": 3, "X": 4}
  thresholds: [0.5, 1.5, 2.5, 3.5]
  
trainer:
  accelerator: gpu
  devices: 1
  num_nodes: 1
  precision: 32

wandb:
  save_dir: ./assets
  entity: gsu-dmlab
  project: uncertainty-flare-classification
