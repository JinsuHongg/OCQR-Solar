hydra:
  run:
    dir: .

experiment:
  task: regression
  ckpt_file_name: resnet18_qr_calibration

data:
  repo: nasa-ibm-ai4science/surya-bench-flare-forecasting
  flare_index:
    path: /scratch/users/jhong36/data/
    train: train.csv
    val: validation.csv
    test: test.csv
    cal: validation.csv 
  input_zarr_path: /scratch/users/jhong36/data/sdo_512.zarr
  input_time_delta: [0]
  input_stat_path: ./assets/stats/los_mag_stat.yaml
  label_type: max_intensity
  limb_mask_path: ./assets/limb_mask.npy
  target_norm_type: log
  channel: hmi_m
  num_workers: 6
  batch_size: 256
  pin_memory: true

check_point:
  model_type: resnet
  base: ./assets/checkpoints/
  mcd: null
  qr: kucqvkv8_resnet18_qr_q89_epoch=9-val_loss=0.1103.ckpt

uc:
  csv_path: ./assets/uc_results/
  significance_level: 0.1
  mcd:
    num_forwards: 100
  cp:
    score_type: l1
  lp:
    subset_size: 1000
  cqr:
    lower_idx: 0
    upper_idx: 2
  methods: ["cqr", "ordinal_cqr"]
  num_classes: 5
  class_mapping: {"FQ": 0, "B": 1, "C": 2, "M": 3, "X": 4}
  thresholds: [2,3,4,5]
  
trainer:
  accelerator: gpu
  devices: 1
  num_nodes: 1
  precision: 32

wandb:
  save_dir: ./assets
  entity: gsu-dmlab
  project: uncertainty-flare-regression
