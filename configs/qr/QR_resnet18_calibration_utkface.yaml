seed: 42
hydra:
  run:
    dir: .

experiment:
  task: classification
  ckpt_file_name: resnet18_qr_ocqr_calibration_retinamnist

data:
  repo: utkface
  num_workers: 4
  batch_size: 128
  pin_memory: true
  label_type: continuous

check_point:
  model_type: resnet
  base: ./assets/checkpoints/qr/
  resnet18_qr: 3k7i7sn1_resnet18_qr_utkface_q89_epoch=20-val_loss=1.6426.ckpt

uc:
  csv_path: ./assets/uc_results/
  significance_level: 0.1
  methods: [ordinal_cqr]
  num_classes: 5
  class_wise: true
  class_mapping: {"0": 0, "1": 1, "2": 2, "3": 3, "4": 4}
  thresholds: [20.0, 40.0, 60.0, 80.0]
  cqr:
    lower_idx: 0
    upper_idx: -1
  
trainer:
  accelerator: gpu
  devices: 1
  num_nodes: 1
  precision: 32

wandb:
  save_dir: ./assets
  entity: gsu-dmlab
  project: uncertainty-medmnist_classification
  offline: false
