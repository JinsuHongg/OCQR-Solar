defaults:
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled

hydra:
  output_subdir: null
  run:
    dir: .

experiment:
  task: regression
  ckpt_file_name: resnet18_qr

data:
  repo: nasa-ibm-ai4science/surya-bench-flare-forecasting
  ref_mask_img: null
  flare_index:
    path: /scratch/users/jhong36/data/
    train: train.csv
    val: validation.csv
    test: test.csv
  input_zarr_path: /scratch/users/jhong36/data/sdo_512.zarr
  input_time_delta: [0] #[-60, 0]
  input_stat_path: ./assets/stats/los_mag_stat.yaml
  label_type: max_intensity
  limb_mask_path: ./assets/limb_mask.npy
  target_norm_type: log
  channel: hmi_m
  # for dataloader
  num_workers: 6
  batch_size: 256
  pin_memory: true

model:
  save_ckpt_path: ./assets/checkpoints/qr/
  ckpt: null
  module_type: qr # mcp, qr
  # module specific
  mcp:
    num_forwards: 100
  qr:
    quantiles: [0.05, 0.5, 0.95]
  
  # base model
  type: resnet18
  resnet18:
    in_channels: 1
    time_steps: 1
    p_drop: 0.5
    
  loss:
    type: mse

optimizer:
  type: adamw
  lr: 5e-5
  weight_decay: 0.01

scheduler:
    use: cosine_warmup # The switch
    monitor: val_loss 
    # Define available strategies
    cosine_warmup:
      total_steps: 1000
      warmup_ratio: 0.1 # Default 10% warmup
    plateau:
      mode: min
      factor: 0.1
      patience: 10

trainer:
  accelerator: gpu
  devices: 1
  num_nodes: 1
  max_epochs: 300
  precision: 32
  log_every_n_steps: 50
  limit_train_batches: null
  limit_val_batches: null
  strategy: auto

wandb:
  save_dir: ./assets
  entity: gsu-dmlab
  project: uncertainty-flare-regression
  log_model: false
  notes: Resnet18 backbone and QR
  offline: false
  save_code: false
  tag: ["resnet18", "qr", "reg"] # backbone model, head type, task
